<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WQ-Brain Controller</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <h2>WQ<span class="highlight">Brain</span></h2>
            </div>
            <nav>
                <a href="#" class="nav-item active" data-target="editor-view">Alpha Editor</a>
                <a href="#" class="nav-item" data-target="settings-view">Sweep Console</a>
                <a href="#" class="nav-item" data-target="logs-view">Terminal</a>
            </nav>
            <div class="action-btn-container">
                <button id="run-btn" class="primary-btn pulse">RUN SIMULATION</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            
            <!-- Editor View -->
            <section id="editor-view" class="view-section active glass-panel">
                <div class="section-header">
                    <h3>Alpha Formulas <span class="badge">alphas.txt</span></h3>
                    <button id="save-alphas-btn" class="secondary-btn">Save Formulas</button>
                </div>
                <textarea id="alphas-editor" spellcheck="false" placeholder="Loading alphas..."></textarea>
            </section>

            <!-- Settings View -->
            <section id="settings-view" class="view-section glass-panel" style="display: none;">
                <div class="section-header">
                    <h3>Sweep Console <span class="badge">settings.json</span></h3>
                    <button id="save-settings-btn" class="secondary-btn">Save Settings</button>
                </div>
                <div class="settings-grid">
                    
                    <div class="settings-group">
                        <h4>Global Settings</h4>
                        <label>
                            <span>Universe:</span>
                            <select id="global-universe">
                                <option value="TOP3000">TOP3000</option>
                                <option value="TOP2000">TOP2000</option>
                                <option value="TOP1000">TOP1000</option>
                                <option value="TOP500">TOP500</option>
                                <option value="TOP200">TOP200</option>
                                <option value="TOPSP500">TOPSP500</option>
                            </select>
                        </label>
                        <label>
                            <span>Neutralization:</span>
                            <select id="global-neutralization">
                                <option value="SUBINDUSTRY">SUBINDUSTRY</option>
                                <option value="INDUSTRY">INDUSTRY</option>
                                <option value="SECTOR">SECTOR</option>
                                <option value="MARKET">MARKET</option>
                                <option value="NONE">NONE</option>
                            </select>
                        </label>
                        <label>
                            <span>Delay:</span>
                            <select id="global-delay">
                                <option value="0">0</option>
                                <option value="1">1</option>
                            </select>
                        </label>
                        <label>
                            <span>Decay:</span>
                            <input type="number" id="global-decay" value="10" min="0" max="512" oninput="if(this.value > 512) this.value = 512; if(this.value < 0 && this.value !== '') this.value = 0;">
                        </label>
                        <label>
                            <span>Truncation:</span>
                            <input type="number" id="global-truncation" step="0.01" value="0.1" min="0" max="1" oninput="if(this.value > 1) this.value = 1; if(this.value < 0 && this.value !== '') this.value = 0;">
                        </label>
                    </div>

                    <div class="settings-group sweep-group">
                        <h4>Sweep Configuration</h4>
                        <label class="checkbox-label">
                            <input type="checkbox" id="enable-sweep">
                            <span>Enable Parameter Sweep</span>
                        </label>
                        <label>
                            <span>Sweep Mode:</span>
                            <select id="sweep-mode">
                                <option value="independent">Independent (Recommended)</option>
                                <option value="grid">Grid (Cartesian)</option>
                            </select>
                        </label>
                        <p class="help-text">Edit `settings.json` directly to change the precise sweep array values for now.</p>
                    </div>

                </div>
            </section>

            <!-- Logs View -->
            <section id="logs-view" class="view-section glass-panel" style="display: none;">
                <div class="section-header">
                    <h3>Execution Terminal <span id="status-badge" class="badge idle">IDLE</span></h3>
                </div>
                <div id="terminal-output" class="terminal"></div>
            </section>

        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">Saved successfully!</div>

    <script src="app.js?v=2"></script>
</body>
</html>
